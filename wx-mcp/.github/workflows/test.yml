name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Run unit tests
        run: |
          pytest tests/ -v --tb=short

      - name: Verify module imports
        run: |
          python -c "import wx_mcp; print('wx_mcp', wx_mcp.__version__)"
          python -c "import wx_mcp.decrypt; print('decrypt OK')"
          python -c "import wx_mcp.crypto; print('crypto OK')"
          python -c "import wx_mcp.reader; print('reader OK')"
